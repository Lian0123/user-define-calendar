<script>
// polyfill minimal navigator.modelContext for WebMCP/demo compatibility
if (!('modelContext' in navigator)) {
  (function() {
    const tools = {};
    navigator.modelContext = {
      addEventListener(type, cb) { window.addEventListener(type, cb); },
      removeEventListener(type, cb) { window.removeEventListener(type, cb); },
      dispatchEvent(evt) { return window.dispatchEvent(evt); },
      request(detail) {
        const ev = new CustomEvent('toolrequest', { detail });
        window.dispatchEvent(ev);
      },
      registerTool(tool) {
        tools[tool.name] = tool;
        console.log('tool registered', tool.name);
      },
      unregisterTool(name) {
        delete tools[name];
        console.log('tool unregistered', name);
      },
      executeTool(name, input) {
        if (tools[name] && typeof tools[name].execute === 'function') {
          return tools[name].execute(input);
        }
        return Promise.reject(new Error('tool not found:' + name));
      }
    };
  })();
}
</script>

    <script>
// register service worker for PWA (manifest.webmanifest used)
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(console.error);
  });
}
// WebMCP event handling (based on react-flightsearch patterns)
window.addEventListener('toolactivated', e => {
  const form = document.getElementById('calendarForm');
  if (form && e.detail && e.detail.toolname === 'configure_calendar') {
    form.classList.add('tool-form-active');
  }
});
window.addEventListener('toolvalidate', e => {
  const errors = [];
  const detail = e.detail || {};
  if (detail.toolname === 'configure_calendar') {
    const form = document.getElementById('calendarForm');
    if (form) {
      const inputs = form.querySelectorAll('input,select');
      inputs.forEach(inp=>{
        if (inp.hasAttribute('required') && !inp.value) {
          errors.push({name: inp.name, message: inp.name + ' is required'});
        }
        const pattern = inp.getAttribute('pattern');
        if (pattern && inp.value) {
          const re = new RegExp(pattern);
          if (!re.test(inp.value)) {
            errors.push({name: inp.name, message: inp.name + ' format invalid'});
          }
        }
      });
    }
  }
  if (errors.length) {
    e.detail.response = {errors};
    const evt = new CustomEvent('toolverror', {detail: e.detail});
    window.dispatchEvent(evt);
  } else {
    const evt = new CustomEvent('toolok', {detail: e.detail});
    window.dispatchEvent(evt);
  }
});
window.addEventListener('toolsubmit', e => {
  const evt = new CustomEvent('toolresponse', {detail:{
    toolname:e.detail.toolname,
    result:'success'
  }});
  window.dispatchEvent(evt);
});
window.addEventListener('tooldone', e => {
  const form = document.getElementById('calendarForm');
  if (form) form.classList.remove('tool-form-active');
});

function t(strings, lang, key) {
  return (locales[lang] && locales[lang][key]) || key;
}

function download(filename, content, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function buildCalendar(state) {
  const { year, monthsCount, daysPerMonth, hoursPerDay, minutesPerHour, sunrise, sunset, holidays, weekDaysCount, weekStartIndex, weekDayNames } = state;
  const months = [];
  let weekdayCounter = weekStartIndex || 0; // index into weekDaysCount
  for (let m = 0; m < monthsCount; m++) {
    const dim = daysPerMonth[m] || daysPerMonth[0] || 30;
    const days = [];
    for (let d = 1; d <= dim; d++) {
      const hours = [];
      for (let h = 0; h < hoursPerDay; h++) {
        hours.push({ hour: h });
      }
      const widx = weekdayCounter % weekDaysCount;
      days.push({
        day: d,
        weekday: widx,
        weekdayName: (weekDayNames && weekDayNames[widx]) || null,
        hoursCount: hoursPerDay,
        minutesPerHour,
        sunrise,
        sunset,
        events: []
      });
      weekdayCounter++;
    }
    months.push({ monthIndex: m + 1, days });
  }
  const holidayList = (holidays || []).map(h => ({ ...h }));
  return {
    year,
    months,
    holidays: holidayList,
    meta: { minutesPerHour, hoursPerDay, weekDaysCount, weekStartIndex, weekDayNames }
  };
}

// WebMCP calendar tool definitions and registration
function generateCalendar(params) {
  // params may include same keys as state
  return buildCalendar(params);
}

function exportCalendar(params) {
  // params.format 'json' or 'js'
  if (params && params.format === 'json') {
    exportJSON();
    return 'JSON file created';
  } else if (params && params.format === 'js') {
    exportJS();
    return 'JS file created';
  }
  return 'invalid format';
}

function setYearPrefixToolFunc(p) {
  setYearPrefix(p.prefix || '');
  return 'year prefix set';
}
const setYearPrefixTool = {
  execute: setYearPrefixToolFunc,
  name: 'setYearPrefix',
  description: 'Set the year prefix text',
  inputSchema: {type:'object',properties:{prefix:{type:'string'}},required:['prefix']},
  outputSchema:{type:'string'}
};

function setWeekDayNameToolFunc(p) {
  setWeekDayNames(old=>{
    const arr=[...old];
    if (p.index!=null && arr[p.index]!=null) arr[p.index]=p.name;
    return arr;
  });
  return 'weekday name set';
}
const setWeekDayNameTool = {
  execute: setWeekDayNameToolFunc,
  name: 'setWeekDayName',
  description: 'Set name of a specific weekday by index',
  inputSchema:{type:'object',properties:{index:{type:'number'},name:{type:'string'}},required:['index','name']},
  outputSchema:{type:'string'}
};

const generateCalendarTool = {
  execute: generateCalendar,
  name: 'generateCalendar',
  description: 'Generate calendar data from parameters',
  inputSchema: {
    type: 'object',
    properties: {
      year: { type: 'number' },
      monthsCount: { type: 'number' },
      daysPerMonth: { type: 'array', items:{type:'number'} },
      hoursPerDay: { type:'number' },
      minutesPerHour: { type:'number' },
      sunrise: { type:'string' },
      sunset: { type:'string' },
      holidays: { type:'array', items:{type:'object'} },
      weekDaysCount:{type:'number'},
      weekStartIndex:{type:'number'},
      weekDayNames:{type:'array',items:{type:'string'}}
    }
  },
  outputSchema: {
    type:'object'
  }
};

const exportCalendarTool = {
  execute: exportCalendar,
  name: 'exportCalendar',
  description: 'Export calendar data (json or js file)',
  inputSchema: {
    type: 'object',
    properties: {
      format: { type: 'string', enum: ['json','js'] }
    },
    required: ['format']
  },
  outputSchema: { type: 'string' }
};

// holiday management tools
function addHolidayToolFunc(h) {
  setHolidays(old => [...old, { month:Number(h.month), day:Number(h.day), name:h.name }]);
  return 'holiday added';
}
const addHolidayTool = {
  execute: addHolidayToolFunc,
  name: 'addHoliday',
  description: 'Add a holiday or event',
  inputSchema:{type:'object',properties:{month:{type:'number'},day:{type:'number'},name:{type:'string'}},required:['month','day','name']},
  outputSchema:{type:'string'}
};

function editHolidayToolFunc(h) {
  setHolidays(old => {
    const copy=[...old];
    if (h.index!=null && copy[h.index]) {
      copy[h.index]={month:Number(h.month),day:Number(h.day),name:h.name};
    }
    return copy;
  });
  return 'holiday edited';
}
const editHolidayTool = {
  execute: editHolidayToolFunc,
  name:'editHoliday',
  description:'Edit existing holiday by index',
  inputSchema:{type:'object',properties:{index:{type:'number'},month:{type:'number'},day:{type:'number'},name:{type:'string'}},required:['index','month','day','name']},
  outputSchema:{type:'string'}
};

function removeHolidayToolFunc(h) {
  setHolidays(old => old.filter((_,i)=>i!==h.index));
  return 'holiday removed';
}
const removeHolidayTool = {
  execute: removeHolidayToolFunc,
  name:'removeHoliday',
  description:'Remove holiday by index',
  inputSchema:{type:'object',properties:{index:{type:'number'}},required:['index']},
  outputSchema:{type:'string'}
};

// register new tools in registration
function registerCalendarTools() {
  const mc = window.navigator.modelContext;
  if (mc) {
    mc.registerTool(generateCalendarTool);
    mc.registerTool(exportCalendarTool);
    mc.registerTool(addHolidayTool);
    mc.registerTool(editHolidayTool);
    mc.registerTool(removeHolidayTool);
    mc.registerTool(setYearPrefixTool);
    mc.registerTool(setWeekDayNameTool);
  }
}

// no-op duplicate removed

function unregisterCalendarTools() {
  const mc = window.navigator.modelContext;
  if (mc) {
    mc.unregisterTool(generateCalendarTool.name);
    mc.unregisterTool(exportCalendarTool.name);
    mc.unregisterTool(addHolidayTool.name);
    mc.unregisterTool(editHolidayTool.name);
    mc.unregisterTool(removeHolidayTool.name);
    mc.unregisterTool(setYearPrefixTool.name);
    mc.unregisterTool(setWeekDayNameTool.name);
  }
}

// auto-register on load
if (window.navigator.modelContext) {
  registerCalendarTools();
}

function sanitizeForFilename(s) {
  return (s || '').toString().trim().replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_\-]/g, '');
}

function App() {
  const [lang, setLang] = useState('zh-TW');
  const [yearPrefix, setYearPrefix] = useState('');
  const [darkMode, setDarkMode] = useState(false);
  const [year, setYear] = useState(new Date().getFullYear());
  const [monthsCount, setMonthsCount] = useState(12);
  const [daysPerMonth, setDaysPerMonth] = useState(Array(12).fill(30));
  const [hoursPerDay, setHoursPerDay] = useState(24);
  const [minutesPerHour, setMinutesPerHour] = useState(60);
  const [sunrise, setSunrise] = useState('06:00');
  const [sunset, setSunset] = useState('18:00');
  const [holidays, setHolidays] = useState([]);
  const [modalOpen, setModalOpen] = useState(false);
  const [modalHoliday, setModalHoliday] = useState({ month:1, day:1, name: '', index:null });
  const [weekDaysCount, setWeekDaysCount] = useState(7);
  const [weekStartIndex, setWeekStartIndex] = useState(0);
  const [weekDayNames, setWeekDayNames] = useState(() => {
    // default names based on initial lang
    return lang === 'zh-TW' ? ['日','一','二','三','四','五','六'] : ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  });
  const [calendar, setCalendar] = useState(null);

  // apply dark mode class to body
  useEffect(() => {
    document.body.classList.toggle('dark', darkMode);
  }, [darkMode]);

  useEffect(() => {
    setDaysPerMonth(prev => {
      const next = prev.slice(0, monthsCount);
      while (next.length < monthsCount) next.push(prev[0] || 30);
      return next;
    });
  }, [monthsCount]);

  useEffect(() => {
    // adjust weekDayNames array length when weekDaysCount changes
    setWeekDayNames(prev => {
      const def = lang === 'zh-TW' ? ['日','一','二','三','四','五','六'] : ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      let next = prev.slice(0, weekDaysCount);
      while (next.length < weekDaysCount) {
        const idx = next.length;
        next.push(def[idx] || `Day ${idx+1}`);
      }
      return next;
    });
    if (weekStartIndex >= weekDaysCount) {
      setWeekStartIndex(0);
    }
  }, [weekDaysCount]);

  useEffect(() => {
    // when changing language, update default day names if user hasn't customized
    setWeekDayNames(prev => {
      const oldDef = lang === 'zh-TW' ? ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'] : ['日','一','二','三','四','五','六'];
      const newDef = lang === 'zh-TW' ? ['日','一','二','三','四','五','六'] : ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const unchanged = prev.length === oldDef.length && prev.every((v,i)=>v===oldDef[i]);
      if (unchanged) return newDef.slice(0, weekDaysCount);
      return prev;
    });
  }, [lang, weekDaysCount]);

  function updateDayCount(idx, value) {
    setDaysPerMonth(d => {
      const copy = [...d];
      copy[idx] = Math.max(1, parseInt(value) || 1);
      return copy;
    });
  }

  function saveHoliday() {
    if (!modalHoliday.name) return;
    const entry = { month: Number(modalHoliday.month), day: Number(modalHoliday.day), name: modalHoliday.name };
    setHolidays(h => {
      if (modalHoliday.index != null) {
        const copy = [...h];
        copy[modalHoliday.index] = entry;
        return copy;
      }
      return [...h, entry];
    });
    setModalOpen(false);
    setModalHoliday({ month:1, day:1, name:'', index:null });
  }

  function removeHoliday(i) {
    setHolidays(h => h.filter((_, idx) => idx !== i));
  }

  function generate() {
    const state = { year, monthsCount, daysPerMonth, hoursPerDay, minutesPerHour, sunrise, sunset, holidays, weekDaysCount, weekStartIndex, weekDayNames };
    const cal = buildCalendar(state);
    for (const h of holidays) {
      const mIdx = h.month - 1;
      if (cal.months[mIdx]) {
        const dayObj = cal.months[mIdx].days.find(dd => dd.day === Number(h.day));
        if (dayObj) dayObj.events.push({ name: h.name, type: 'holiday' });
      }
    }
    setCalendar(cal);
  }

  function exportJSON() {
    if (!calendar) generate();
    const data = calendar || buildCalendar({ year, monthsCount, daysPerMonth, hoursPerDay, minutesPerHour, sunrise, sunset, holidays });
    const prefixForFile = sanitizeForFilename(yearPrefix);
    const filename = `${prefixForFile ? prefixForFile + '_' : ''}${year}-calendar.json`;
    download(filename, JSON.stringify(data, null, 2), 'application/json');
  }

  function exportJS() {
    if (!calendar) generate();
    const data = calendar || buildCalendar({ year, monthsCount, daysPerMonth, hoursPerDay, minutesPerHour, sunrise, sunset, holidays });
    const prefixForFile = sanitizeForFilename(yearPrefix);
    const filename = `${prefixForFile ? prefixForFile + '_' : ''}${year}-calendar.js`;
    const js = `// Auto-generated calendar for ${yearPrefix ? yearPrefix + ' ' : ''}${year}\nconst calendarData = ${JSON.stringify(data, null, 2)};\nexport default calendarData;\n`;
    download(filename, js, 'text/javascript');
  }

  const L = (k) => (locales[lang] && locales[lang][k]) || k;

  return (
    <div className="container">
      <header className="top">
        <h1>{L('title')}</h1>
        <div className="header-controls">
          <select value={lang} onChange={e=>setLang(e.target.value)}><option value="zh-TW">中文(繁)</option><option value="en">English</option><option value="ja">日本語</option></select>
          <button className="github-button" onClick={()=>window.open('https://github.com/Lian0123/user-define-calendar','_blank')}>{L('github')}</button>
          <button className="theme-toggle" onClick={()=>setDarkMode(d=>!d)}>{darkMode?L('lightMode'):L('darkMode')}</button>
        </div>
      </header>

      <div className="controls">
        <label>{L('prefix')}<input placeholder={L('prefix')} value={yearPrefix} onChange={e=>setYearPrefix(e.target.value)} /></label>
        <label>{L('year')}: <input type="number" value={year} onChange={e=>setYear(Number(e.target.value))} /></label>
        <label>{L('monthsCount')}: <input type="number" value={monthsCount} min={1} onChange={e=>setMonthsCount(Math.max(1, Number(e.target.value)||1))} /></label>
        <label>{L('hoursPerDay')}: <input type="number" value={hoursPerDay} min={1} onChange={e=>setHoursPerDay(Math.max(1, Number(e.target.value)||1))} /></label>
        <label>{L('minutesPerHour')}: <input type="number" value={minutesPerHour} min={1} onChange={e=>setMinutesPerHour(Math.max(1, Number(e.target.value)||1))} /></label>
        <label>{L('sunrise')}: <input type="time" value={sunrise} onChange={e=>setSunrise(e.target.value)} /></label>
        <label>{L('sunset')}: <input type="time" value={sunset} onChange={e=>setSunset(e.target.value)} /></label>
      </div>
      
      <section className="week-settings">
        <h3>{L('weekSettings')}</h3>
        <div className="week-controls">
          <label>{L('weekDays')}: <input type="number" value={weekDaysCount} min={1} onChange={e=>setWeekDaysCount(Math.max(1, Number(e.target.value)||1))} /></label>
          <label>{L('weekStart')}: 
            <select value={weekStartIndex} onChange={e=>setWeekStartIndex(Number(e.target.value))}>
              {weekDayNames.map((n,i)=><option key={i} value={i}>{n || i}</option>)}
            </select>
          </label>
        </div>
        <div className="day-names">
          <label>{L('dayNames')}:</label>
          <div className="day-names-inputs">
            {weekDayNames.map((name,i)=>(
              <input key={i} value={name} onChange={e=>{
                const v=e.target.value;
                setWeekDayNames(w=>{const c=[...w];c[i]=v;return c;});
              }} placeholder={`#${i+1}`} />
            ))}
          </div>
        </div>
      </section>

      <section className="month-settings">
        <h3>{L('monthSettings')}</h3>
        <div className="months-grid">
          {Array.from({length: monthsCount}).map((_, i) => (
            <div key={i} className="month-item">
              <div>月 {i+1}</div>
              <input type="number" value={daysPerMonth[i]||30} min={1} onChange={e=>updateDayCount(i, e.target.value)} />
            </div>
          ))}
        </div>
      </section>

      <section className="holidays">
        <h3>{L('holidays')}</h3>
        <button onClick={()=>{setModalHoliday({month:1,day:1,name:'',index:null});setModalOpen(true);}}>{L('add')}</button>
        <ul>
          {holidays.map((h, i) => (
            <li key={i}>{h.name} — 月{h.month}日{h.day} 
              <button onClick={()=>{setModalHoliday({...h,index:i});setModalOpen(true);}}>{L('edit')}</button>
              <button onClick={()=>removeHoliday(i)}>{L('remove')}</button>
            </li>
          ))}
        </ul>
      </section>
      {modalOpen && (
        <div className="modal-backdrop" onClick={()=>setModalOpen(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <h3>{modalHoliday.index!=null ? L('edit') : L('add')} {L('holidays')}</h3>
            <div className="field">
              <label>{L('prefix') /* reuse prefix label for simplicity? maybe month*/}</label>
            </div>
            <div className="field">
              <label>{L('month')}</label>
              <select value={modalHoliday.month} onChange={e=>setModalHoliday(m=>({...m,month:e.target.value}))}>
                {Array.from({length: monthsCount}).map((_,i)=><option key={i} value={i+1}>{i+1}</option>)}
              </select>
            </div>
            <div className="field">
              <label>{L('day')}</label>
              <input type="number" min={1} value={modalHoliday.day} onChange={e=>setModalHoliday(m=>({...m,day:e.target.value}))} />
            </div>
            <div className="field">
              <label>{L('name')}</label>
              <input value={modalHoliday.name} onChange={e=>setModalHoliday(m=>({...m,name:e.target.value}))} />
            </div>
            <div className="modal-buttons">
              <button onClick={saveHoliday}>{L('save')}</button>
              <button onClick={()=>setModalOpen(false)}>{L('cancel')}</button>
            </div>
          </div>
        </div>
      )}

      <div className="actions">
        <button onClick={generate}>{L('generate')}</button>
        <button onClick={exportJSON}>{L('exportJSON')}</button>
        <button onClick={exportJS}>{L('exportJS')}</button>
      </div>

      <section className="preview">
        <h3>{L('preview')}</h3>
        {calendar ? (
          <div>
            <div>{L('year')}: {yearPrefix ? yearPrefix + ' ' : ''}{calendar.year}</div>
            <div>月份數: {calendar.months.length}</div>
            <div>週天: {calendar.meta.weekDaysCount}</div>
            <div>星期名稱: {calendar.meta.weekDayNames.join(', ')}</div>
            <div>{L('example')}</div>
            <pre>{JSON.stringify(calendar.months[0].days.slice(0,3), null, 2)}</pre>
          </div>
        ) : (<div>尚未產生年曆</div>)}
      </section>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
